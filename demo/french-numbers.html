<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>French Numbers Practice</title>
<style>
*, *::before, *::after { box-sizing: border-box; }

:root {
  --ink: #243042;
  --muted: #667085;
  --line: #d6deea;
  --panel: #ffffff;
  --blue: #2563eb;
  --green: #16a34a;
  --red: #dc2626;
  --yellow: #f5b51b;
  --teal: #0f9f9a;
  --purple: #7c3aed;
  --bg1: #e8f5ff;
  --bg2: #fff6dc;
  --shadow: 0 18px 48px rgba(36, 48, 66, .14);
}

html, body { min-height: 100%; }

body {
  margin: 0;
  color: var(--ink);
  font-family: "Arial Rounded MT Bold", "Trebuchet MS", Arial, sans-serif;
  background:
    radial-gradient(circle at 12% 18%, rgba(245, 181, 27, .34), transparent 17rem),
    radial-gradient(circle at 86% 12%, rgba(15, 159, 154, .25), transparent 15rem),
    linear-gradient(135deg, var(--bg1), #fff 48%, var(--bg2));
}

button, select { font: inherit; color: inherit; }

.app {
  width: min(1180px, 100%);
  margin: 0 auto;
  padding: 24px;
  display: grid;
  gap: 18px;
}

.top {
  display: grid;
  grid-template-columns: minmax(280px, 1fr) minmax(280px, 430px);
  gap: 18px;
  align-items: stretch;
}

.hero, .panel {
  background: rgba(255, 255, 255, .82);
  border: 1px solid rgba(214, 222, 234, .9);
  border-radius: 8px;
  box-shadow: var(--shadow);
}

.hero {
  padding: 28px;
  display: grid;
  align-content: center;
  gap: 20px;
}

h1 {
  margin: 0;
  font-size: clamp(2.1rem, 6vw, 4.8rem);
  line-height: .95;
  letter-spacing: 0;
}

.sub {
  margin: 0;
  color: var(--muted);
  font-size: clamp(1rem, 2vw, 1.2rem);
}

.display {
  display: grid;
  grid-template-columns: 180px minmax(0, 1fr);
  gap: 20px;
  align-items: center;
}

.big-number {
  aspect-ratio: 1;
  border-radius: 8px;
  background: #182230;
  color: #ecfeff;
  display: grid;
  place-items: center;
  font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
  font-size: clamp(4rem, 12vw, 6.6rem);
  font-weight: 900;
  font-variant-numeric: tabular-nums;
}

.word-box {
  min-height: 180px;
  border: 2px solid var(--line);
  border-radius: 8px;
  background: #fffaf0;
  padding: 20px;
  display: grid;
  align-content: center;
  gap: 8px;
}

.word {
  font-size: clamp(2rem, 5.8vw, 3.8rem);
  line-height: 1.05;
  font-weight: 900;
}

.hint {
  color: var(--muted);
  font-size: .98rem;
}

.panel {
  padding: 16px;
  display: grid;
  gap: 14px;
}

.tabs {
  display: grid;
  grid-template-columns: repeat(2, minmax(0, 1fr));
  gap: 10px;
}

.tab-panel.is-hidden {
  display: none;
}

.label {
  color: var(--muted);
  font-size: .82rem;
  font-weight: 900;
  text-transform: uppercase;
  letter-spacing: .08em;
}

.row {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 10px;
}

.range-row {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 10px;
}

.btn {
  min-height: 48px;
  border: 2px solid var(--line);
  border-radius: 8px;
  background: #fff;
  font-weight: 900;
  cursor: pointer;
  transition: transform .12s ease, border-color .12s ease, background .12s ease;
}

.btn:hover, .btn:focus-visible {
  border-color: #7dd3fc;
  outline: 0;
  transform: translateY(-1px);
}

.btn.primary {
  background: var(--green);
  border-color: var(--green);
  color: #fff;
}

.btn.blue {
  background: var(--blue);
  border-color: var(--blue);
  color: #fff;
}

.btn.active {
  background: #182230;
  border-color: #182230;
  color: #fff;
}

.picker {
  display: grid;
  grid-template-columns: 1fr auto 1fr;
  gap: 10px;
  align-items: center;
}

#bigBuilder .picker {
  grid-template-columns: 1fr auto 1fr auto 1fr;
}

select {
  min-height: 48px;
  border: 2px solid var(--line);
  border-radius: 8px;
  background: #fff;
  padding: 0 12px;
  font-weight: 900;
}

.grid-panel {
  padding: 16px;
}

.toolbar {
  display: flex;
  justify-content: space-between;
  gap: 12px;
  flex-wrap: wrap;
  align-items: center;
  margin-bottom: 12px;
}

.number-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(86px, 1fr));
  gap: 10px;
}

.card {
  min-height: 78px;
  border: 2px solid var(--line);
  border-radius: 8px;
  background: #fff;
  cursor: pointer;
  display: grid;
  align-content: center;
  justify-items: center;
  gap: 4px;
  padding: 8px;
  transition: transform .12s ease, border-color .12s ease, box-shadow .12s ease;
}

.card:hover, .card:focus-visible {
  outline: 0;
  transform: translateY(-2px);
  border-color: var(--yellow);
  box-shadow: 0 10px 24px rgba(36, 48, 66, .12);
}

.card.active {
  border-color: var(--blue);
  background: #eef6ff;
}

.card-num {
  font-size: 1.7rem;
  font-weight: 900;
  font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
}

.card-word {
  color: var(--muted);
  font-size: .82rem;
  text-align: center;
  line-height: 1.1;
}

.quiz {
  display: grid;
  gap: 12px;
}

.quiz-target {
  min-height: 78px;
  border-radius: 8px;
  background: #f0fdf4;
  border: 2px solid #bbf7d0;
  display: grid;
  align-content: center;
  justify-items: center;
  padding: 12px;
  text-align: center;
}

.quiz-number {
  font-size: 2.8rem;
  font-weight: 900;
  font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
}

.choices {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 10px;
}

.choice.correct {
  background: #dcfce7;
  border-color: var(--green);
}

.choice.wrong {
  background: #fee2e2;
  border-color: var(--red);
}

.status {
  min-height: 22px;
  color: var(--muted);
  font-size: .95rem;
}

@media (max-width: 820px) {
  .app { padding: 14px; }
  .top { grid-template-columns: 1fr; }
  .display { grid-template-columns: 1fr; }
  .big-number { width: min(160px, 100%); justify-self: center; }
  .range-row { grid-template-columns: repeat(2, 1fr); }
}
</style>
</head>
<body>
<main class="app">
  <section class="top">
    <div class="hero">
      <div>
        <h1>Les nombres</h1>
        <p class="sub">Tap a number, listen, then try the quiz.</p>
      </div>

      <div class="display" aria-live="polite">
        <div class="big-number" id="bigNumber">8</div>
        <div class="word-box">
          <div class="word" id="frenchWord">huit</div>
          <div class="hint" id="pronHint">French voice: Amélie when available.</div>
        </div>
      </div>

      <div class="row">
        <button class="btn primary" id="speakBtn">Speak</button>
        <button class="btn" id="randomBtn">Random</button>
      </div>
    </div>

    <aside class="panel">
      <div class="tabs" role="tablist" aria-label="Number practice sections">
        <button class="btn active" id="basicTab" data-tab="basic" role="tab" aria-selected="true">0-100</button>
        <button class="btn" id="bigTab" data-tab="big" role="tab" aria-selected="false">Beyond 100</button>
      </div>

      <div id="basicBuilder" class="tab-panel">
        <div class="label">Build a number</div>
        <div class="picker">
          <select id="tensSelect" aria-label="Tens"></select>
          <strong>+</strong>
          <select id="onesSelect" aria-label="Ones"></select>
        </div>
      </div>

      <div id="bigBuilder" class="tab-panel is-hidden">
        <div class="label">Build a bigger number</div>
        <div class="picker">
          <select id="hundredsSelect" aria-label="Hundreds"></select>
          <strong>+</strong>
          <select id="bigTensSelect" aria-label="Tens"></select>
          <strong>+</strong>
          <select id="bigOnesSelect" aria-label="Ones"></select>
        </div>
      </div>

      <div id="basicRanges" class="tab-panel">
        <div class="label">Practice range</div>
        <div class="range-row" id="rangeButtons">
          <button class="btn active" data-range="0-20">0-20</button>
          <button class="btn" data-range="21-40">21-40</button>
          <button class="btn" data-range="41-70">41-70</button>
          <button class="btn" data-range="71-100">71-100</button>
        </div>
      </div>

      <div id="bigRanges" class="tab-panel is-hidden">
        <div class="label">Practice range</div>
        <div class="range-row">
          <button class="btn active" data-big-range="100-200">100-200</button>
          <button class="btn" data-big-range="201-500">201-500</button>
          <button class="btn" data-big-range="501-999">501-999</button>
          <button class="btn" data-big-range="1000-1000">1000</button>
        </div>
      </div>

      <div class="quiz">
        <div class="label">Quiz</div>
        <div class="quiz-target">
          <div>Which one is</div>
          <div class="quiz-number" id="quizNumber">8</div>
        </div>
        <div class="choices" id="choices"></div>
        <button class="btn blue" id="newQuizBtn">New question</button>
      </div>

      <div class="status" id="status"></div>
    </aside>
  </section>

  <section class="panel grid-panel">
    <div class="toolbar">
      <div>
        <div class="label">Tap to hear</div>
        <strong id="gridTitle">Numbers 0-20</strong>
      </div>
    </div>
    <div class="number-grid" id="numberGrid"></div>
  </section>
</main>

<script>
const NUMBER_WORDS = {
  0: "zéro",
  1: "un",
  2: "deux",
  3: "trois",
  4: "quatre",
  5: "cinq",
  6: "six",
  7: "sept",
  8: "huit",
  9: "neuf",
  10: "dix",
  11: "onze",
  12: "douze",
  13: "treize",
  14: "quatorze",
  15: "quinze",
  16: "seize",
  17: "dix-sept",
  18: "dix-huit",
  19: "dix-neuf",
  20: "vingt",
  21: "vingt et un",
  22: "vingt-deux",
  23: "vingt-trois",
  24: "vingt-quatre",
  25: "vingt-cinq",
  26: "vingt-six",
  27: "vingt-sept",
  28: "vingt-huit",
  29: "vingt-neuf",
  30: "trente",
  31: "trente et un",
  32: "trente-deux",
  33: "trente-trois",
  34: "trente-quatre",
  35: "trente-cinq",
  36: "trente-six",
  37: "trente-sept",
  38: "trente-huit",
  39: "trente-neuf",
  40: "quarante",
  41: "quarante et un",
  42: "quarante-deux",
  43: "quarante-trois",
  44: "quarante-quatre",
  45: "quarante-cinq",
  46: "quarante-six",
  47: "quarante-sept",
  48: "quarante-huit",
  49: "quarante-neuf",
  50: "cinquante",
  51: "cinquante et un",
  52: "cinquante-deux",
  53: "cinquante-trois",
  54: "cinquante-quatre",
  55: "cinquante-cinq",
  56: "cinquante-six",
  57: "cinquante-sept",
  58: "cinquante-huit",
  59: "cinquante-neuf",
  60: "soixante",
  61: "soixante et un",
  62: "soixante-deux",
  63: "soixante-trois",
  64: "soixante-quatre",
  65: "soixante-cinq",
  66: "soixante-six",
  67: "soixante-sept",
  68: "soixante-huit",
  69: "soixante-neuf",
  70: "soixante-dix",
  71: "soixante et onze",
  72: "soixante-douze",
  73: "soixante-treize",
  74: "soixante-quatorze",
  75: "soixante-quinze",
  76: "soixante-seize",
  77: "soixante-dix-sept",
  78: "soixante-dix-huit",
  79: "soixante-dix-neuf",
  80: "quatre-vingts",
  81: "quatre-vingt-un",
  82: "quatre-vingt-deux",
  83: "quatre-vingt-trois",
  84: "quatre-vingt-quatre",
  85: "quatre-vingt-cinq",
  86: "quatre-vingt-six",
  87: "quatre-vingt-sept",
  88: "quatre-vingt-huit",
  89: "quatre-vingt-neuf",
  90: "quatre-vingt-dix",
  91: "quatre-vingt-onze",
  92: "quatre-vingt-douze",
  93: "quatre-vingt-treize",
  94: "quatre-vingt-quatorze",
  95: "quatre-vingt-quinze",
  96: "quatre-vingt-seize",
  97: "quatre-vingt-dix-sept",
  98: "quatre-vingt-dix-huit",
  99: "quatre-vingt-dix-neuf",
  100: "cent"
};

const state = {
  current: 8,
  range: [0, 20],
  quizAnswer: 8,
  tab: "basic",
  max: 100
};

const bigNumber = document.getElementById("bigNumber");
const frenchWord = document.getElementById("frenchWord");
const pronHint = document.getElementById("pronHint");
const speakBtn = document.getElementById("speakBtn");
const randomBtn = document.getElementById("randomBtn");
const tensSelect = document.getElementById("tensSelect");
const onesSelect = document.getElementById("onesSelect");
const hundredsSelect = document.getElementById("hundredsSelect");
const bigTensSelect = document.getElementById("bigTensSelect");
const bigOnesSelect = document.getElementById("bigOnesSelect");
const numberGrid = document.getElementById("numberGrid");
const gridTitle = document.getElementById("gridTitle");
const choices = document.getElementById("choices");
const quizNumber = document.getElementById("quizNumber");
const newQuizBtn = document.getElementById("newQuizBtn");
const statusEl = document.getElementById("status");

class SynthSingleton {
  constructor() {
    this.synth = window.speechSynthesis;
    this.voices = [];
    if (this.synth) {
      const load = () => {
        this.voices = this.synth.getVoices();
        if (this.onVoicesChanged) this.onVoicesChanged();
      };
      load();
      this.synth.onvoiceschanged = load;
    }
  }
  getVoice(lang, preferName) {
    if (preferName) {
      const named = this.voices.find(v => v.name === preferName);
      if (named) return named;
    }
    return this.voices.find(v => v.lang === lang)
      || this.voices.find(v => v.lang && v.lang.startsWith(lang.slice(0, 2)))
      || null;
  }
  speak(utt) { if (this.synth) this.synth.speak(utt); }
  cancel() { if (this.synth) this.synth.cancel(); }
}

const speaker = ("speechSynthesis" in window) ? new SynthSingleton() : null;
if (speaker) speaker.onVoicesChanged = setVoiceStatus;
let activeUtterance = null;

function wordFor(n) {
  if (NUMBER_WORDS[n]) return NUMBER_WORDS[n];
  if (n === 1000) return "mille";
  if (n > 100 && n < 1000) {
    const hundreds = Math.floor(n / 100);
    const rest = n % 100;
    const hundredText = hundreds === 1 ? "cent" : wordFor(hundreds) + " cent" + (rest === 0 ? "s" : "");
    return rest === 0 ? hundredText : hundredText + " " + wordFor(rest);
  }
  return String(n);
}

function setVoiceStatus() {
  if (!speaker) {
    pronHint.textContent = "Speech is not available in this browser.";
    return;
  }
  const voice = speaker.getVoice("fr-FR", "Amélie") || speaker.getVoice("fr-FR", "Amelie");
  pronHint.textContent = voice ? "French voice: " + voice.name + "." : "French voice: browser default.";
}

function speakText(text) {
  if (!speaker || !text) return;
  if (activeUtterance) {
    activeUtterance.onend = null;
    activeUtterance.onerror = null;
  }
  speaker.cancel();

  const utt = new SpeechSynthesisUtterance(text);
  activeUtterance = utt;
  utt.lang = "fr-FR";
  utt.rate = .72;
  utt.volume = 1;
  utt.voice = speaker.getVoice("fr-FR", "Amélie") || speaker.getVoice("fr-FR", "Amelie");

  speakBtn.textContent = "Speaking...";
  utt.onend = () => { speakBtn.textContent = "Speak"; };
  utt.onerror = ev => {
    if (ev.error === "interrupted") return;
    speakBtn.textContent = "Speak";
    statusEl.textContent = "Speech error: " + ev.error;
  };
  speaker.speak(utt);
}

function speakCurrent() {
  speakText(wordFor(state.current));
}

function setNumber(n, shouldSpeak) {
  state.current = Math.max(0, Math.min(state.max, n));
  bigNumber.textContent = state.current;
  frenchWord.textContent = wordFor(state.current);
  if (state.tab === "basic") {
    tensSelect.value = String(Math.floor(state.current / 10) * 10);
    onesSelect.value = String(state.current % 10);
  } else {
    const capped = Math.min(999, Math.max(100, state.current));
    hundredsSelect.value = String(Math.floor(capped / 100) * 100);
    bigTensSelect.value = String(Math.floor((capped % 100) / 10) * 10);
    bigOnesSelect.value = String(capped % 10);
  }
  document.querySelectorAll(".card").forEach(card => {
    card.classList.toggle("active", Number(card.dataset.number) === state.current);
  });
  if (shouldSpeak) speakCurrent();
}

function randomInRange() {
  const min = state.range[0];
  const max = state.range[1];
  return min + Math.floor(Math.random() * (max - min + 1));
}

function buildSelectors() {
  for (let n = 0; n <= 100; n += 10) {
    const opt = document.createElement("option");
    opt.value = String(n);
    opt.textContent = String(n);
    tensSelect.appendChild(opt);
  }

  for (let n = 0; n <= 9; n++) {
    const opt = document.createElement("option");
    opt.value = String(n);
    opt.textContent = String(n);
    onesSelect.appendChild(opt);
  }

  for (let n = 100; n <= 900; n += 100) {
    const opt = document.createElement("option");
    opt.value = String(n);
    opt.textContent = String(n);
    hundredsSelect.appendChild(opt);
  }

  for (let n = 0; n <= 90; n += 10) {
    const opt = document.createElement("option");
    opt.value = String(n);
    opt.textContent = String(n);
    bigTensSelect.appendChild(opt);
  }

  for (let n = 0; n <= 9; n++) {
    const opt = document.createElement("option");
    opt.value = String(n);
    opt.textContent = String(n);
    bigOnesSelect.appendChild(opt);
  }
}

function updateFromBuilder() {
  const tens = Number(tensSelect.value);
  const ones = Number(onesSelect.value);
  setNumber(Math.min(100, tens + ones), true);
}

function updateFromBigBuilder() {
  const hundreds = Number(hundredsSelect.value);
  const tens = Number(bigTensSelect.value);
  const ones = Number(bigOnesSelect.value);
  setNumber(Math.min(999, hundreds + tens + ones), true);
}

function buildGrid() {
  const [min, max] = state.range;
  numberGrid.innerHTML = "";
  gridTitle.textContent = "Numbers " + min + "-" + max;
  const values = gridValues(min, max);
  values.forEach(n => {
    const card = document.createElement("button");
    card.className = "card";
    card.dataset.number = String(n);
    card.innerHTML = '<span class="card-num">' + n + '</span><span class="card-word">' + wordFor(n) + '</span>';
    card.addEventListener("click", () => setNumber(n, true));
    numberGrid.appendChild(card);
  });
  setNumber(state.current, false);
}

function gridValues(min, max) {
  if (max - min <= 100) {
    const values = [];
    for (let n = min; n <= max; n++) values.push(n);
    return values;
  }
  const values = [];
  for (let n = min; n <= max; n += 25) values.push(n);
  if (!values.includes(max)) values.push(max);
  return values;
}

function shuffle(items) {
  const copy = items.slice();
  for (let i = copy.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    const temp = copy[i];
    copy[i] = copy[j];
    copy[j] = temp;
  }
  return copy;
}

function makeQuiz() {
  const answer = randomInRange();
  const options = new Set([answer]);
  while (options.size < 4) {
    const spread = state.tab === "basic" ? 10 : 80;
    const minOption = state.tab === "basic" ? 0 : 100;
    const candidate = Math.max(minOption, Math.min(state.max, answer + Math.floor(Math.random() * (spread * 2 + 1)) - spread));
    options.add(candidate);
  }

  state.quizAnswer = answer;
  quizNumber.textContent = answer;
  choices.innerHTML = "";
  statusEl.textContent = "";

  shuffle([...options]).forEach(n => {
    const btn = document.createElement("button");
    btn.className = "btn choice";
    btn.textContent = wordFor(n);
    btn.addEventListener("click", () => {
      const ok = n === state.quizAnswer;
      btn.classList.add(ok ? "correct" : "wrong");
      statusEl.textContent = ok ? "Correct." : "Try again.";
      if (ok) {
        setNumber(n, true);
        setTimeout(makeQuiz, 900);
      } else {
        speakText(wordFor(n));
      }
    });
    choices.appendChild(btn);
  });
}

function setRange(value) {
  const parts = value.split("-").map(Number);
  state.range = [parts[0], parts[1]];
  document.querySelectorAll("[data-range]").forEach(btn => {
    btn.classList.toggle("active", btn.dataset.range === value);
  });
  buildGrid();
  makeQuiz();
}

function setBigRange(value) {
  const parts = value.split("-").map(Number);
  state.range = [parts[0], parts[1]];
  document.querySelectorAll("[data-big-range]").forEach(btn => {
    btn.classList.toggle("active", btn.dataset.bigRange === value);
  });
  buildGrid();
  makeQuiz();
}

function setTab(tab) {
  state.tab = tab;
  state.max = tab === "basic" ? 100 : 1000;

  document.querySelectorAll("[data-tab]").forEach(btn => {
    const active = btn.dataset.tab === tab;
    btn.classList.toggle("active", active);
    btn.setAttribute("aria-selected", active ? "true" : "false");
  });

  document.getElementById("basicBuilder").classList.toggle("is-hidden", tab !== "basic");
  document.getElementById("bigBuilder").classList.toggle("is-hidden", tab !== "big");
  document.getElementById("basicRanges").classList.toggle("is-hidden", tab !== "basic");
  document.getElementById("bigRanges").classList.toggle("is-hidden", tab !== "big");

  if (tab === "basic") {
    state.range = [0, 20];
    document.querySelectorAll("[data-range]").forEach(btn => {
      btn.classList.toggle("active", btn.dataset.range === "0-20");
    });
    setNumber(Math.min(state.current, 100), false);
  } else {
    state.range = [100, 200];
    document.querySelectorAll("[data-big-range]").forEach(btn => {
      btn.classList.toggle("active", btn.dataset.bigRange === "100-200");
    });
    setNumber(Math.max(100, state.current), false);
  }
  buildGrid();
  makeQuiz();
}

function init() {
  buildSelectors();
  buildGrid();
  setNumber(8, false);
  makeQuiz();
  setVoiceStatus();

  speakBtn.addEventListener("click", speakCurrent);
  randomBtn.addEventListener("click", () => setNumber(randomInRange(), true));
  tensSelect.addEventListener("change", updateFromBuilder);
  onesSelect.addEventListener("change", updateFromBuilder);
  hundredsSelect.addEventListener("change", updateFromBigBuilder);
  bigTensSelect.addEventListener("change", updateFromBigBuilder);
  bigOnesSelect.addEventListener("change", updateFromBigBuilder);
  newQuizBtn.addEventListener("click", makeQuiz);
  document.querySelectorAll("[data-range]").forEach(btn => {
    btn.addEventListener("click", () => setRange(btn.dataset.range));
  });
  document.querySelectorAll("[data-big-range]").forEach(btn => {
    btn.addEventListener("click", () => setBigRange(btn.dataset.bigRange));
  });
  document.querySelectorAll("[data-tab]").forEach(btn => {
    btn.addEventListener("click", () => setTab(btn.dataset.tab));
  });
}

document.addEventListener("DOMContentLoaded", init);
</script>
</body>
</html>
