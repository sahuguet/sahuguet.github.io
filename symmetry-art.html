<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Symmetry Art</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; touch-action: none; }
  body {
    background: #1a1a2e;
    display: flex;
    flex-direction: column;
    height: 100dvh;
    overflow: hidden;
    font-family: 'Segoe UI', sans-serif;
    color: white;
    user-select: none;
  }

  #toolbar {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 8px 12px;
    background: #16213e;
    flex-wrap: wrap;
    flex-shrink: 0;
    border-bottom: 2px solid #0f3460;
  }

  .toolbar-group {
    display: flex;
    align-items: center;
    gap: 6px;
    background: #0f3460;
    border-radius: 12px;
    padding: 5px 10px;
  }

  .toolbar-label {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 1px;
    opacity: 0.7;
    white-space: nowrap;
  }

  /* Symmetry buttons */
  .sym-btn {
    background: #1a1a4e;
    border: 2px solid #444;
    border-radius: 10px;
    color: white;
    font-size: 13px;
    padding: 6px 10px;
    cursor: pointer;
    transition: all 0.15s;
    white-space: nowrap;
    touch-action: manipulation;
  }
  .sym-btn:hover { background: #2a2a6e; border-color: #888; }
  .sym-btn.active {
    background: #e94560;
    border-color: #ff6b8a;
    box-shadow: 0 0 10px #e9456066;
  }

  /* Color swatches */
  .color-swatch {
    width: 32px;
    height: 32px;
    border-radius: 50%;
    border: 3px solid transparent;
    cursor: pointer;
    transition: transform 0.15s, border-color 0.15s;
    touch-action: manipulation;
    flex-shrink: 0;
  }
  .color-swatch:hover { transform: scale(1.15); }
  .color-swatch.active { border-color: white; transform: scale(1.2); }

  #colorPicker {
    width: 32px;
    height: 32px;
    border-radius: 50%;
    border: 3px solid #666;
    cursor: pointer;
    padding: 0;
    background: none;
    touch-action: manipulation;
    flex-shrink: 0;
  }
  #colorPicker::-webkit-color-swatch-wrapper { padding: 0; border-radius: 50%; }
  #colorPicker::-webkit-color-swatch { border-radius: 50%; border: none; }

  /* Brush size */
  #brushSize {
    -webkit-appearance: none;
    width: 90px;
    height: 6px;
    border-radius: 3px;
    background: #444;
    outline: none;
    cursor: pointer;
  }
  #brushSize::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 20px;
    height: 20px;
    border-radius: 50%;
    background: #e94560;
    cursor: pointer;
    border: 2px solid white;
  }

  #brushPreview {
    width: 36px;
    height: 36px;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  #brushDot {
    border-radius: 50%;
    background: white;
    transition: width 0.1s, height 0.1s;
  }

  /* Action buttons */
  .action-btn {
    background: #0f3460;
    border: 2px solid #1a5276;
    border-radius: 10px;
    color: white;
    font-size: 13px;
    padding: 7px 14px;
    cursor: pointer;
    transition: all 0.15s;
    touch-action: manipulation;
    white-space: nowrap;
  }
  .action-btn:hover { background: #1a5276; }
  .action-btn.danger { border-color: #e94560; }
  .action-btn.danger:hover { background: #e94560; }

  #canvas-container {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    background: #111;
  }

  #canvas {
    display: block;
    background: #000;
    cursor: crosshair;
    touch-action: none;
  }

  #hint {
    position: fixed;
    bottom: 12px;
    left: 50%;
    transform: translateX(-50%);
    background: #0f3460cc;
    padding: 6px 16px;
    border-radius: 20px;
    font-size: 12px;
    opacity: 0.8;
    pointer-events: none;
    transition: opacity 1s;
  }
  #hint.hidden { opacity: 0; }
</style>
</head>
<body>

<div id="toolbar">
  <!-- Symmetry -->
  <div class="toolbar-group">
    <span class="toolbar-label">Symmetry</span>
    <button class="sym-btn active" data-sym="2h" title="Mirror left/right">↔ Mirror</button>
    <button class="sym-btn" data-sym="2v" title="Mirror top/bottom">↕ Mirror</button>
    <button class="sym-btn" data-sym="4" title="4-fold symmetry">✦ 4</button>
    <button class="sym-btn" data-sym="6" title="6-fold symmetry">✦ 6</button>
    <button class="sym-btn" data-sym="8" title="8-fold symmetry">✦ 8</button>
    <button class="sym-btn" data-sym="12" title="12-fold mandala">✦ 12</button>
    <button class="sym-btn" data-sym="kaleid" title="Kaleidoscope (6-fold + mirror)">❖ Kaleid</button>
  </div>

  <!-- Colors -->
  <div class="toolbar-group">
    <span class="toolbar-label">Color</span>
    <div class="color-swatch active" style="background:#ffffff" data-color="#ffffff"></div>
    <div class="color-swatch" style="background:#ff4f8b" data-color="#ff4f8b"></div>
    <div class="color-swatch" style="background:#ff9f43" data-color="#ff9f43"></div>
    <div class="color-swatch" style="background:#ffd32a" data-color="#ffd32a"></div>
    <div class="color-swatch" style="background:#0be881" data-color="#0be881"></div>
    <div class="color-swatch" style="background:#00d2d3" data-color="#00d2d3"></div>
    <div class="color-swatch" style="background:#54a0ff" data-color="#54a0ff"></div>
    <div class="color-swatch" style="background:#a29bfe" data-color="#a29bfe"></div>
    <input type="color" id="colorPicker" value="#ffffff" title="Custom color">
  </div>

  <!-- Brush -->
  <div class="toolbar-group">
    <span class="toolbar-label">Brush</span>
    <div id="brushPreview"><div id="brushDot" style="width:8px;height:8px"></div></div>
    <input type="range" id="brushSize" min="1" max="40" value="4">
  </div>

  <!-- Actions -->
  <div class="toolbar-group">
    <button class="action-btn" id="saveBtn">💾 Save</button>
    <button class="action-btn danger" id="clearBtn">🗑 Clear</button>
  </div>
</div>

<div id="canvas-container">
  <canvas id="canvas"></canvas>
</div>

<div id="hint">Draw anywhere to create symmetric art!</div>

<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const container = document.getElementById('canvas-container');
const hint = document.getElementById('hint');

let symmetry = '2h';
let color = '#ffffff';
let brushWidth = 4;
let painting = false;
let lastX = null, lastY = null;

// --- Canvas resize ---
function resizeCanvas() {
  const w = container.clientWidth;
  const h = container.clientHeight;
  if (!w || !h) return;
  const tmp = document.createElement('canvas');
  tmp.width = canvas.width || w;
  tmp.height = canvas.height || h;
  tmp.getContext('2d').drawImage(canvas, 0, 0);
  canvas.width = w;
  canvas.height = h;
  ctx.drawImage(tmp, 0, 0);
}
// Wait for layout to settle before sizing
requestAnimationFrame(() => { resizeCanvas(); });
window.addEventListener('resize', resizeCanvas);

// --- Symmetry transforms ---
function getTransforms(x, y) {
  const cx = canvas.width / 2;
  const cy = canvas.height / 2;
  const dx = x - cx;
  const dy = y - cy;
  const pts = [];

  if (symmetry === '2h') {
    pts.push([cx + dx, cy + dy]);
    pts.push([cx - dx, cy + dy]);
  } else if (symmetry === '2v') {
    pts.push([cx + dx, cy + dy]);
    pts.push([cx + dx, cy - dy]);
  } else if (symmetry === '4') {
    pts.push([cx + dx, cy + dy]);
    pts.push([cx - dy, cy + dx]);
    pts.push([cx - dx, cy - dy]);
    pts.push([cx + dy, cy - dx]);
  } else {
    const n = symmetry === 'kaleid' ? 6 : parseInt(symmetry);
    const r = Math.sqrt(dx * dx + dy * dy);
    const baseAngle = Math.atan2(dy, dx);
    const mirror = symmetry === 'kaleid';
    for (let i = 0; i < n; i++) {
      const a = baseAngle + (2 * Math.PI * i) / n;
      pts.push([cx + r * Math.cos(a), cy + r * Math.sin(a)]);
      if (mirror) {
        const am = -baseAngle + (2 * Math.PI * i) / n;
        pts.push([cx + r * Math.cos(am), cy + r * Math.sin(am)]);
      }
    }
  }
  return pts;
}

// --- Draw ---
function drawSegment(fromX, fromY, toX, toY) {
  const fromPts = getTransforms(fromX, fromY);
  const toPts = getTransforms(toX, toY);
  ctx.strokeStyle = color;
  ctx.lineWidth = brushWidth;
  ctx.lineCap = 'round';
  ctx.lineJoin = 'round';
  for (let i = 0; i < fromPts.length; i++) {
    ctx.beginPath();
    ctx.moveTo(fromPts[i][0], fromPts[i][1]);
    ctx.lineTo(toPts[i][0], toPts[i][1]);
    ctx.stroke();
  }
}

function drawDot(x, y) {
  const pts = getTransforms(x, y);
  ctx.fillStyle = color;
  for (const [px, py] of pts) {
    ctx.beginPath();
    ctx.arc(px, py, brushWidth / 2, 0, Math.PI * 2);
    ctx.fill();
  }
}

// --- Input handling (unified pointer events) ---
function getPos(e) {
  const rect = canvas.getBoundingClientRect();
  const touch = (e.touches && e.touches[0]) || (e.changedTouches && e.changedTouches[0]);
  if (touch) return [touch.clientX - rect.left, touch.clientY - rect.top];
  return [e.clientX - rect.left, e.clientY - rect.top];
}

function onStart(e) {
  e.preventDefault();
  painting = true;
  [lastX, lastY] = getPos(e);
  drawDot(lastX, lastY);
  hideHint();
}

function onMove(e) {
  e.preventDefault();
  if (!painting) return;
  const [x, y] = getPos(e);
  drawSegment(lastX, lastY, x, y);
  lastX = x;
  lastY = y;
}

function onEnd(e) {
  e.preventDefault();
  painting = false;
  lastX = null;
  lastY = null;
}

// Mouse
canvas.addEventListener('mousedown', onStart);
canvas.addEventListener('mousemove', onMove);
canvas.addEventListener('mouseup', onEnd);
canvas.addEventListener('mouseleave', onEnd);

// Touch (finger + Apple Pencil)
canvas.addEventListener('touchstart', onStart, { passive: false });
canvas.addEventListener('touchmove', onMove, { passive: false });
canvas.addEventListener('touchend', onEnd, { passive: false });
canvas.addEventListener('touchcancel', onEnd, { passive: false });

// --- Symmetry buttons ---
document.querySelectorAll('.sym-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.sym-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    symmetry = btn.dataset.sym;
  });
});

// --- Color swatches ---
function setColor(c) {
  color = c;
  document.querySelectorAll('.color-swatch').forEach(s => {
    s.classList.toggle('active', s.dataset.color === c);
  });
  document.getElementById('colorPicker').value = c;
}

document.querySelectorAll('.color-swatch').forEach(s => {
  s.addEventListener('click', () => setColor(s.dataset.color));
  s.addEventListener('touchend', e => { e.preventDefault(); setColor(s.dataset.color); });
});

const picker = document.getElementById('colorPicker');
picker.addEventListener('input', e => {
  color = e.target.value;
  document.querySelectorAll('.color-swatch').forEach(s => s.classList.remove('active'));
});

// --- Brush size ---
const brushSlider = document.getElementById('brushSize');
const brushDot = document.getElementById('brushDot');
brushSlider.addEventListener('input', e => {
  brushWidth = parseInt(e.target.value);
  const size = Math.min(32, brushWidth * 1.5 + 4);
  brushDot.style.width = size + 'px';
  brushDot.style.height = size + 'px';
});

// --- Save ---
document.getElementById('saveBtn').addEventListener('click', () => {
  const link = document.createElement('a');
  link.download = 'symmetry-art.png';
  link.href = canvas.toDataURL('image/png');
  link.click();
});

// --- Clear ---
document.getElementById('clearBtn').addEventListener('click', () => {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
});

// --- Hint ---
let hintTimer;
function hideHint() {
  hint.classList.add('hidden');
  clearTimeout(hintTimer);
}
hintTimer = setTimeout(hideHint, 4000);
</script>
</body>
</html>
